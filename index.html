<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boyan THEGAMER - Magic Tiles</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@3.9.1/tsparticles.bundle.min.js"></script>
</head>
<body>
    <div id="game-wrapper">
        <div id="fire-bg"></div>
        <div id="game-container"></div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal">
        <div class="auth-box">
            <button id="auth-close">&times;</button>
            <h2 id="auth-title">LOGIN</h2>
            <input type="text" id="auth-username" placeholder="Username" autocomplete="username" maxlength="20">
            <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
            <p id="auth-error"></p>
            <button id="auth-submit">LOGIN</button>
            <button id="auth-toggle">Need an account? Register</button>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
